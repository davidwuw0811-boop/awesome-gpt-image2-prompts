<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1e2e 100%);border-bottom:1px solid var(--border);padding:2rem 1.5rem 1.5rem;text-align:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}

.header .subtitle{color:var(--text2);font-size:.9rem;margin-bottom:1rem}
.stats{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.4rem 1rem;font-size:.85rem;color:var(--text2)}
.stat strong{color:var(--accent);font-size:1.1rem;margin-right:.3rem}

/* Search */
.search-wrap{max-width:640px;margin:0 auto;position:relative}
.search-wrap input{width:100%;padding:.75rem 1rem .75rem 2.8rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-wrap .icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text2);font-size:1.1rem;pointer-events:none}

/* Filters */
.filters{max-width:1200px;margin:1.2rem auto .5rem;padding:0 1rem;display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.35rem .9rem;font-size:.82rem;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}

.filter-btn .count{background:var(--surface2);border-radius:10px;padding:0 .45rem;margin-left:.3rem;font-size:.75rem}
.filter-btn.active .count{background:rgba(255,255,255,.2)}

/* Grid */
.container{max-width:1200px;margin:0 auto;padding:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.no-results{text-align:center;padding:4rem 1rem;color:var(--text2);font-size:1.1rem}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;transition:all .25s;position:relative;display:flex;flex-direction:column}

.card-tag{display:inline-block;background:linear-gradient(135deg,var(--accent2),#7c3aed);color:#fff;font-size:.72rem;padding:.2rem .6rem;border-radius:6px;font-weight:500}

.card-title-en{font-size:.82rem;color:var(--text2);margin-bottom:.7rem;font-style:italic}
.card-prompt{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.8rem;font-size:.78rem;color:var(--text);line-height:1.55;max-height:180px;overflow-y:auto;margin-bottom:.7rem;flex:1;word-break:break-word;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}

.card-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem}
.card-meta{font-size:.72rem;color:var(--text2);display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}

.card-note{font-size:.72rem;color:var(--yellow);margin-top:.4rem;padding-top:.4rem;border-top:1px solid var(--border);line-height:1.4}

@media(max-width:768px){

@media(max-width:400px){

/* Scroll to top */
.scroll-top{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;border-radius:50%;background:var(--accent2);color:#fff;border:none;cursor:pointer;font-size:1.2rem;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .2s;z-index:99}
.scroll-top:hover{background:var(--accent);transform:scale(1.1)}
.scroll-top.show{display:flex}

/* Toast */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:.6rem 1.5rem;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
</style>

const PROMPTS = [{"id": 100, "title_en": "Real Object & Hand-Drawn Doodle Creative Ad", "title_cn": "实物+手绘涂鸦创意广告", "category": "advertising", "category_cn": "广告设计", "prompt": "A minimalist and creative advertisement set on a pure white background. A real [real object] combined with hand-drawn black ink doodles, with loose and playful lines. The doodle depicts: [doodle concept and interaction: interacting with the object in a clever, imaginative way]. Add bold black [ad copy] text at the top or center. Place the [brand logo] clearly at the bottom. The visual should be clean, fun, high-contrast, and cleverly conceived.", "note": "Replace [real object], [doodle concept and interaction], [ad copy], and [brand logo] with specific content.", "author": "@azed_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 99, "title_en": "Black & White Portrait Art", "title_cn": "黑白人像艺术", "category": "portrait", "category_cn": "人像/角色", "prompt": "A high-resolution black-and-white portrait artwork in an editorial and fine art photography style. The background features a soft gradient effect, transitioning from medium gray to near-pure white, creating a sense of depth and quietude. The delicate film grain texture adds a touchable, analog-photography-like softness, reminiscent of classic black-and-white photography.\n\nOn the right side of the frame, a blurred yet stunning face of Harry Potter faintly emerges from the shadows — not in a traditional posed shot, but as if captured in a moment between thought or breath. Only a portion of his face is revealed: perhaps one eye, a cheekbone, and the outline of the corner of his lips, evoking a sense of mystery, intimacy, and elegance. His features are refined and profound, radiating a melancholic and poetic beauty without appearing contrived.\n\nA gentle directional light, softly diffused, caresses the curve of his cheek, or flickers as a catchlight in his eye — this is the emotional core of the image. The rest is dominated by generous negative space, deliberately kept minimal, allowing the composition to breathe freely. No text, no logos — just an interplay of light, shadow, and emotion.\n\nThe overall atmosphere is abstract yet deeply human, like a fleeting glance, or a memory between waking and dreaming: intimate, timeless, and wistfully beautiful.", "note": "Can replace Harry Potter with any character name.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 98, "title_en": "Blurred Silhouette Behind Frosted Glass", "title_cn": "磨砂玻璃后的模糊剪影", "category": "portrait", "category_cn": "人像/角色", "prompt": "A black-and-white photo showing a blurred silhouette of a [subject] behind a frosted or translucent surface. The [part] outline is clear, pressed against the surface, creating a sharp contrast with the rest of the hazy, blurred figure. The background is a soft gray gradient tone, enhancing the mysterious and artistic atmosphere.", "note": "Fill in [subject] and [part] with specific descriptions. E.g., [subject]: a Sith Lord holding a red lightsaber.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 97, "title_en": "Cute & Cozy Knitted Doll", "title_cn": "可爱毛线编织娃娃", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "A close-up, professionally composed photo showing a handmade crocheted yarn doll being gently held in both hands. The doll has a round shape, [upload image] rendered as a cute chibi character of the person, with vivid color contrasts and rich details. The hands holding the doll are natural and gentle, with clearly visible finger poses, natural skin texture and light transitions, conveying a warm and realistic tactile sensation. The background is slightly blurred, showing an indoor setting with a warm wooden tabletop and natural light streaming in through windows, creating a cozy and intimate atmosphere. The overall image conveys a sense of exquisite craftsmanship and cherished warmth.", "note": "Upload a photo as reference to generate a cute chibi knitted doll version of the person.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 96, "title_en": "Custom Anime Figure", "title_cn": "定制动漫手办", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Generate a photo of an anime-style figure placed on a tabletop, presented from a casual, everyday perspective as if casually shot with a phone. The figure model is based on the person in the attached photo, accurately reproducing the full-body pose, facial expression, and outfit from the photo, ensuring the figure's entire body is fully displayed. The overall design is delicate and refined, with hair and clothing featuring natural, soft gradient colors and fine textures, leaning toward a Japanese anime style, rich in detail, realistic in texture, and visually exquisite.", "note": "Upload a photo containing the person's full-body pose for generating the figure model.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 95, "title_en": "Selfie to Bobblehead Generator", "title_cn": "自拍转摇头公仔", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Turn this photo into a bobblehead: slightly enlarge the head, keep the face accurate, cartoonize the body. [Place it on a bookshelf].", "note": "Replace [Place it on a bookshelf] with your desired scene or background.", "author": "@thisdudelikesAI", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 94, "title_en": "Three Animals Selfie at Landmark", "title_cn": "三只动物地标自拍", "category": "scene", "category_cn": "风景/场景", "prompt": "A close-up selfie photo of three [animal type] in front of the iconic [landmark], each with a different expression, shot during golden hour with cinematic lighting. The animals are close to the camera, heads together, mimicking a selfie pose, displaying expressions of joy, surprise, and calm. The background shows the full architectural details of [landmark] with soft light and a warm atmosphere. Shot in a photographic, realistic cartoon style, high detail, 1:1 aspect ratio.", "note": "Replace [animal type] and [landmark] with specific descriptions.", "author": "@berryxia_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 93, "title_en": "Glass Retexturing (JSON Style)", "title_cn": "玻璃材质重渲染", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Retexture the reference image based on the JSON aesthetic definition below\n{\n  \"style\": \"photorealistic 3D render\",\n  \"material\": \"glass with transparent and iridescent effects\",\n  \"surface_texture\": \"smooth, polished with subtle reflections and refractive effects\",\n  \"lighting\": {\n    \"type\": \"studio HDRI\",\n    \"intensity\": \"high\",\n    \"direction\": \"angled top-left key light and ambient fill\",\n    \"accent_colors\": [\"blue\", \"green\", \"purple\"],\n    \"reflections\": true,\n    \"refractions\": true,\n    \"dispersion_effects\": true,\n    \"bloom\": true\n  },\n  \"color_scheme\": {\n    \"primary\": \"transparent with iridescent blue, green, and purple hues\",\n    \"secondary\": \"crystal-clear with subtle chromatic shifts\",\n    \"highlights\": \"soft, glowing accents reflecting rainbow-like effects\",\n    \"rim_light\": \"soft reflective light around edges\"\n  },\n  \"background\": {\n    \"color\": \"black\",\n    \"vignette\": true,\n    \"texture\": \"none\"\n  },\n  \"post_processing\": {\n    \"chromatic_aberration\": true,\n    \"glow\": true,\n    \"high_contrast\": true,\n    \"sharp_details\": true\n  }\n}", "note": "Upload an image as the basis for retexturing. Use GPT image 2 (not Sora).", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 92, "title_en": "Perspective 3D Pop-Out Effect", "title_cn": "透视3D破屏效果", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Hyper-realistic, shot from a top-down overhead angle, a beautiful Instagram model [Anne Hathaway / see reference image], with exquisite and beautiful makeup and fashionable styling, standing on a smartphone screen held up by a hand, creating a strong perspective illusion. Emphasize the 3D effect of the girl stepping out of the phone. She wears black-framed glasses, dressed in high-street fashion, playfully striking a cute pose. The phone screen is treated as a dark floor, like a small stage. The scene uses strong forced perspective to express the proportional difference between the palm, phone, and girl. Background is clean gray, using soft indoor light, shallow depth of field, overall style is surreal realistic composite. Extra strong perspective.", "note": "Replace [Anne Hathaway] with another person's name or use a reference image.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 91, "title_en": "Google Maps to Ancient Treasure Map", "title_cn": "谷歌地图变古代藏宝图", "category": "creative", "category_cn": "创意转换", "prompt": "Transform the image into an ancient treasure map drawn on aged parchment. The map contains detailed elements such as sailing ships on the ocean, ancient ports or castles along the coastline, dotted-line paths leading to a marked treasure location with a large \"X\", mountains, palm trees, and a decorative compass rose. The overall style is reminiscent of old pirate adventure movies.", "note": "Upload a Google Maps screenshot or other map image as the basis for transformation.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 90, "title_en": "Branded Keyboard Keycaps", "title_cn": "品牌键帽设计", "category": "product", "category_cn": "产品展示图", "prompt": "A hyper-realistic 3D render showing four mechanical keyboard keycaps arranged in a tight 2x2 grid, with all keycaps touching each other. Viewed from an isometric angle. One keycap is transparent with \"{just}\" printed in red. The other three keycaps use the colors: {black, purple, and white}. One keycap features the Github logo. The other two keycaps have \"{fork}\" and \"{it}\" written on them respectively. Realistic plastic texture, rounded sculpted keycaps, soft shadows, clean light gray background.", "note": "Replace brand name, tagline, and keycap colors.", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 89, "title_en": "Chrome-Plated Emoji Badge", "title_cn": "镀铬Emoji徽章", "category": "product", "category_cn": "产品展示图", "prompt": "A high-precision 3D render showing a metallic badge based on the emoji icon {👍}, mounted on a vertical merchandise card, with an ultra-smooth chrome finish and rounded 3D icon shape, stylized futuristic design with soft reflections and clean shadows. The paper card has a die-cut Euro-style hanging hole at the top center, with a prominent title \"{Awesome}\" above the badge, and a fun tagline \"{Smash that ⭐ if you like it!}\" below. Background is a soft gray, with soft studio lighting, overall minimalist style.", "note": "Replace the emoji icon, title and tagline.", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 88, "title_en": "Children's Coloring Page Illustration", "title_cn": "儿童涂色页插画", "category": "illustration", "category_cn": "动漫/插画", "prompt": "A black-and-white line drawing coloring illustration, suitable for printing directly on standard-sized (8.5x11 inches) paper, without paper borders. The overall illustration style is fresh and clean, using clear and smooth black outline strokes, no shading, no grayscale, no color fill, with a pure white background for easy coloring.\n[Also, for users who are unsure about coloring, please generate a complete color version as a small reference image in the bottom right corner]\nTarget audience: [children aged 6-9]\nScene description:\n[A unicorn strolling on a forest meadow, with bright sunshine, blue sky and white clouds]", "note": "Replace target audience and scene description in brackets.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 87, "title_en": "Letter & Word Meaning Fusion", "title_cn": "字母与词义融合", "category": "text_render", "category_cn": "文字渲染", "prompt": "Incorporate the meaning of the word into its letters, cleverly blending graphics and letters together.\nWord: { beautify }\nAdd a brief description of the word below", "note": "Replace { beautify } with the word you want to blend.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 86, "title_en": "Double Exposure", "title_cn": "双重曝光", "category": "portrait", "category_cn": "人像/角色", "prompt": "Double exposure, Midjourney style, fused, blended, overlaid double exposure image, double exposure style. An outstanding masterpiece by Yukisakura, showcasing a wonderful double exposure composition that harmoniously interweaves the silhouette of Aragorn, son of Arathorn, with the visually striking, rugged landscapes of Middle-earth in vibrant spring. Sunlit pine forests, mountain peaks, and a lone horse crossing a trail echo outward from the textures of his form, adding layers of narrative and solitude. A beautiful tension builds as the clean, crisp monochrome background maintains sharp contrast, drawing all focus to the richly layered double exposure. It features a vibrant full-color palette inside Aragorn's silhouette, with clear, deliberate lines tracing every contour with emotional precision. (Detailed:1.45). (Detailed background:1.4).", "note": "Replace character and landscape descriptions.", "author": "rezzycheck (Sora)", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 85, "title_en": "Surreal Interactive Scene", "title_cn": "超现实互动场景", "category": "illustration", "category_cn": "动漫/插画", "prompt": "A pencil sketch depicting a scene of [Subject 1] interacting with [Subject 2], where [Subject 2] is rendered in a realistic full-color style, creating a surreal contrast with the hand-drawn sketch style of [Subject 1] and the background.", "note": "Replace [Subject 1] and [Subject 2] with specific subject descriptions.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 84, "title_en": "Animal Silicone Wrist Rest", "title_cn": "动物硅胶腕托", "category": "product", "category_cn": "产品展示图", "prompt": "Create an image of a cute chibi-style silicone wrist rest, shaped based on the emoji 【🐼】, made of soft food-grade silicone material with a skin-friendly matte texture, filled with slow-rebound memory foam inside. It has an anthropomorphic cartoon style with a lively expression, arms spread open lying on the desk surface, in a pose that embraces the wrist. The overall shape is round and adorable, colored in 【🐼】 color scheme, with a healing and cute style, suitable for office use. Background is pure white, with soft lighting, product photography style, front view or 45-degree overhead angle, high-definition details, highlighting the silicone texture and comfort function.", "note": "Replace 【🐼】 with other animal Emojis.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 83, "title_en": "Glowing Line Anatomy Illustration", "title_cn": "发光线条解剖图", "category": "illustration", "category_cn": "动漫/插画", "prompt": "A digital illustration depicting a [SUBJECT], whose structure is outlined by a set of glowing, clean, and pure blue lines. The scene is set against a dark background to highlight the form and features of the [SUBJECT]. A specific part, such as [PART], is emphasized with a red glow to indicate the importance or special significance of that area. The overall style is both educational and visually appealing, designed as if it were an advanced imaging technology.", "note": "Replace [SUBJECT] and [PART] in the prompt.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 82, "title_en": "City-Themed Weather Forecast", "title_cn": "城市主题天气预报", "category": "scene", "category_cn": "风景/场景", "prompt": "From a clear 45-degree overhead angle, display an isometric miniature model scene featuring iconic city buildings such as [Shanghai Oriental Pearl Tower, the Bund]. Weather effects are cleverly integrated into the scene, with soft cloudy weather gently interacting with the city. Use physically-based rendering (PBR) and realistic lighting effects, solid background, clean and concise. The image uses centered composition to highlight the precise and delicate beauty of the 3D model. Display \"[Shanghai Cloudy 20°C]\" at the top of the image, with a cloudy weather icon.", "note": "City, weather, temperature, and building names can be customized.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 81, "title_en": "Translucent Glass Texture Transformation", "title_cn": "半透明玻璃材质转换", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Transform the attached image into soft 3D translucent glass with a frosted matte effect and detailed texture, original colors, centered on a light gray background, gently floating in space, soft shadows, natural light", "note": "Upload a reference photo of a physical object.", "author": "@azed_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 80, "title_en": "Code-Style Business Card", "title_cn": "代码风格名片", "category": "text_render", "category_cn": "文字渲染", "prompt": "Close-up shot: a hand holding a business card designed to look like a JSON file in VS Code. The code on the card is displayed with real JSON syntax highlighting. The window interface includes typical toolbar icons and a title bar showing \"Business Card.json\", with the overall style fully consistent with the VS Code interface. The background is slightly blurred, highlighting the business card content.\nThe JSON code on the card is as follows:\n{\n  \"name\": \"Jamez Bondos\",\n  \"title\": \"Your Title\",\n  \"email\": \"your@email.com\",\n  \"link\": \"yourwebsite\"\n}", "note": "Replace the name, title, email, and link data in the JSON code.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 79, "title_en": "LEGO Cityscape", "title_cn": "乐高城市景观", "category": "scene", "category_cn": "风景/场景", "prompt": "Create a highly detailed and vibrantly colored LEGO version of the Shanghai Bund scene. The foreground features the classic historic Bund buildings, exquisitely recreated with LEGO bricks in Western and Neoclassical architectural facades, including details such as clock towers, domes, and colonnades. LEGO minifigures are strolling along the riverbank, taking photos, and sightseeing, with classic-style LEGO cars parked along the streets. The background features the spectacular Huangpu River, constructed with blue translucent LEGO bricks, with LEGO ferries and sightseeing boats on the river surface. On the opposite bank, the Pudong Lujiazui area is lined with skyscrapers, including the Oriental Pearl Tower, Shanghai Tower, Jin Mao Tower, and the World Financial Center—these ultra-modern LEGO skyscrapers are richly colored and realistically shaped. The sky is bright LEGO blue, dotted with a few white LEGO brick clouds, presenting an overall vibrant and modern visual effect.", "note": "Can reference this prompt to generate other city landscapes.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 78, "title_en": "Glass Material Retexturing", "title_cn": "玻璃材质重渲染(JSON)", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "retexture the image attached based on the json below:\n\n{\n  \"style\": \"photorealistic\",\n  \"material\": \"glass\",\n  \"background\": \"plain white\",\n  \"object_position\": \"centered\",\n  \"lighting\": \"soft, diffused studio lighting\",\n  \"camera_angle\": \"eye-level, straight-on\",\n  \"resolution\": \"high\",\n  \"aspect_ratio\": \"2:3\",\n  \"details\": {\n    \"reflections\": true,\n    \"shadows\": false,\n    \"transparency\": true\n  }\n}", "note": "Uses JSON structure to control output style. Upload an image to be retextured.", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 77, "title_en": "Crystal Ball Story Scene", "title_cn": "水晶球故事场景", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "An exquisite crystal ball rests quietly on a warm, soft tabletop beside a window. The background is blurred and hazy, with warm-toned sunlight gently penetrating the crystal ball, refracting golden sparkles of light, warmly illuminating the slightly dim surrounding space. Inside the crystal ball, a mini three-dimensional world themed around {Chang'e Flying to the Moon} naturally unfolds—a delicate, exquisite, and dreamy 3D landscape where all characters and objects are in cute chibi style, refined and beautiful, filled with lively emotional interactions between them. The overall atmosphere is full of East Asian fantasy elements, with extremely rich details, presenting a magical realism-like wondrous texture. The entire scene is poetic and dreamlike, gorgeous and elegant, radiating warm and soft light, as if given life within the warm interplay of light and shadow.", "note": "Replace {Chang'e Flying to the Moon} with any story scene description.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 76, "title_en": "Nostalgic Anime-Style Movie Poster", "title_cn": "怀旧动漫风电影海报", "category": "poster", "category_cn": "海报设计", "prompt": "An anime movie poster in the style of {The Lord of the Rings}, with the anime art style of \"High School DXD\". The poster shows visible fold creases, with physical damage and scuff marks at the crease areas from prolonged repeated folding, and colors have faded in some places. The surface is covered with irregular fold marks, turning traces, and scratches—these are minor wear accumulated through constant handling, like the irreversible process of entropy continuously expanding.\nHowever, the beautiful memories preserved in our hearts remain completely intact. When you gaze at this nostalgia-filled poster, what you feel is the emotional essence carried by those collectibles that have become incredibly precious over time.", "note": "Replace {The Lord of the Rings} with other movies. The anime style can also be modified.", "author": "photis (Sora)", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 75, "title_en": "Social Media Photo Frame Fusion", "title_cn": "社交媒体相框融合", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Create a stylized 3D chibi character based on the attached photo, accurately preserving the character's facial features and clothing details. The character's left hand makes a heart gesture (with a red heart element above the fingers), playfully sitting on the edge of a giant Instagram photo frame with legs dangling outside the frame. The top of the frame displays the username \"Beauty\", with social media icons (likes, comments, shares) floating around it.", "note": "Replace username and icons. Upload an image as reference.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 74, "title_en": "Logo-Shaped Creative Bookshelf", "title_cn": "Logo造型创意书架", "category": "product", "category_cn": "产品展示图", "prompt": "Take a photo of a modern bookshelf whose design is inspired by the shape of [LOGO]. The bookshelf is made of smooth, interconnected curves forming multiple sections of varying sizes. The overall material is smooth matte black metal with wooden shelves inside the curves. Soft warm LED light strips outline the inner curve contours. The bookshelf is mounted on a neutral-toned wall, displaying colorful books, small green plants, and minimalist art pieces. The overall atmosphere is creative, elegant, and slightly futuristic.", "note": "Replace [LOGO] with a specific brand logo description.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 73, "title_en": "Custom Chibi Keychain", "title_cn": "定制Q版钥匙扣", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "A close-up photo showing a cute and colorful keychain held in a person's hand. The keychain is designed in a chibi style of [reference image]. The keychain is made of soft rubber material with thick black outlines, connected to a small silver key ring, with a neutral-toned background.", "note": "Upload a photo of a person or object as the keychain design subject.", "author": "@azed_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 72, "title_en": "Golden Pendant Necklace", "title_cn": "金色吊坠项链", "category": "product", "category_cn": "产品展示图", "prompt": "A photorealistic close-up image showing a gold pendant necklace held by a woman's hand. The pendant features an embossed design of [image / emoji], hanging from a polished gold chain. The background is a soft, blurred neutral beige tone, with natural lighting, realistic skin tones, product photography style, 16:9 aspect ratio.", "note": "Replace [image/emoji] with a specific image description or Emoji.", "author": "@azed_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 71, "title_en": "Mini Cyberpunk Tilt-Shift Landscape", "title_cn": "赛博朋克微缩移轴景观", "category": "scene", "category_cn": "风景/场景", "prompt": "An ultra-detailed miniature 【Cyberpunk】 landscape viewed from above, using a tilt-shift lens effect. The scene is filled with toy-like elements, all rendered in high-resolution CG. The lighting is dramatic, creating a cinematic atmosphere, with vivid colors, strong contrast, emphasizing depth of field effects and realistic micro-perspective, making viewers feel as if they are looking down at a toy-world-like miniature reality. The scene contains numerous visual gags and details with high rewatch value.", "note": "Replace 【Cyberpunk】 with other styles like futuristic city, steampunk, medieval village, etc.", "author": "terry623", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 70, "title_en": "Original Pokemon Generation", "title_cn": "原创宝可梦生成", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Create an original creature based on this object (provided photo). The creature should look like it belongs to a fantasy monster-catching universe, with a cute or cool design influenced by retro Japanese RPG monster art. The image must include:\n  – A full-body view of the creature, inspired by the object's shape, material, or purpose.\n  – A small sphere or capsule at its feet (similar to a Poke Ball), with its design pattern and colors matching the object's appearance—not a standard Poke Ball, but a custom design.\n  – An invented name for the creature, displayed next to or below it. – Its element type (e.g., Fire, Water, Metal, Nature, Electric...), based on the object's core attributes. The illustration should look like it's from a fantasy creature encyclopedia, with clean lines, soft shading, and an expressive, character-driven design.", "note": "Upload a photo of an object, food, etc. as inspiration.", "author": "@Anima_Labs", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 69, "title_en": "Silhouette Art", "title_cn": "剪影艺术", "category": "illustration", "category_cn": "动漫/插画", "prompt": "A basic outline silhouette of [PROMPT]. The background is bright yellow, and the silhouette is solid black fill.", "note": "Replace [PROMPT] with a specific subject.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 68, "title_en": "Futuristic Logo Trading Card", "title_cn": "未来感Logo交易卡", "category": "card", "category_cn": "AI卡牌", "prompt": "{\n    \"prompt\": \"A futuristic trading card with a dark, moody neon aesthetic and soft sci-fi lighting. The card features a semi-transparent, rounded rectangle with slightly muted glowing edges, appearing as if made of holographic glass. At the center is a large glowing logo of {{logo}}, with no additional text or label, illuminated with a smooth gradient of {{colors}}, but not overly bright. The reflections on the card surface should be subtle, with a slight glossy finish catching ambient light. The background is a dark carbon fiber texture or deep gradient with soft ambient glows bleeding into the edges. Add subtle light rays streaming down diagonally from the top, giving the scene a soft cinematic glow. Apply light motion blur to the edges and reflections to give the scene a sense of depth and energy, as if it's part of a high-end tech animation still. Below the card, include realistic floor reflections that mirror the neon edges and logo—slightly diffused for a grounded, futuristic look. Text elements are minimal and softly lit: top-left shows '{{ticker}}', top-right has a stylized signature, and the bottom displays '{{company_name}}' with a serial number '{{card_number}}', a revenue badge reading '{{revenue}}', and the year '{{year}}'. Typography should have a faint glow with slight blurring, and all elements should feel premium, elegant, and softly illuminated—like a high-end cyberpunk collectible card.\",\n    \"parameters\": {\n        \"logo\": \"Tesla logo\",\n        \"ticker\": \"TSLA\",\n        \"company_name\": \"Tesla Inc.\",\n        \"card_number\": \"#0006\",\n        \"revenue\": \"$96.8B\",\n        \"year\": \"2025\",\n        \"colors\": [\"red\", \"white\", \"dark gray\"]\n    }\n}", "note": "Modify values in parameters object to customize the card.", "author": "@hewarsaber", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 67, "title_en": "Hyper-Realistic 3D Game Scene", "title_cn": "超写实3D游戏场景", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "An ultra-realistic 3D rendered scene recreating Natasha's character design from the 2008 game \"Command & Conquer: Red Alert 3,\" faithfully following the original model. The scene is set in a dimly lit, cluttered 2008-era bedroom, where the character is sitting on the carpet, facing an old-fashioned TV playing \"Command & Conquer: Red Alert 3\" with a game controller nearby.\n\nThe entire room is filled with 2008-era nostalgic atmosphere: snack wrappers, soda cans, posters, and tangled wires. Natasha Volkova is captured in the moment of turning her head, looking back at the camera, with a hint of innocent smile on her iconic ethereally beautiful face. Her upper body is slightly twisted, with natural dynamics, as if reacting to being startled by a camera flash.\n\nThe flash slightly overexposes her face and clothes, making her silhouette stand out more prominently in the dim room. The entire photo looks raw and natural, with strong chiaroscuro casting deep shadows behind her, the image full of tactile quality, carrying an authentic 2008 film snapshot analog texture.", "note": "Recreates a nostalgic 2008-era gaming scene.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 66, "title_en": "Creative Silk Universe", "title_cn": "创意丝绸宇宙", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Transform {❄️} into a soft 3D silk-textured object. The entire surface of the object is wrapped in smooth, flowing silk fabric, with surreal wrinkle details, soft highlights and shadows. The object floats gently in the center of a clean light gray background, creating a light and elegant atmosphere. The overall style is surreal, tactile and modern, conveying a feeling of comfort and refined whimsy. Studio lighting, high-resolution render.", "note": "Replace {❄️} with your target emoji or object.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 65, "title_en": "Fantasy Underwater Scene Popsicle", "title_cn": "梦幻海底场景冰棍", "category": "food", "category_cn": "食物摄影", "prompt": "A tilted first-person perspective shot of a hand holding a surreal popsicle. The popsicle has a transparent blue shell, inside which an underwater scene is displayed: a small diver, several small fish and floating bubbles, along with rolling waves, with a green popsicle stick running through the center. The popsicle is slightly melted, with a wooden stick at the bottom that the hand is gripping. The background is a soft-focus New York street scene, shot in a high-end product photography style.", "note": "", "author": "@madpencil_", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 64, "title_en": "Steampunk Mechanical Fish", "title_cn": "蒸汽朋克机械鱼", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "A steampunk-style mechanical fish with a brass-style body, where the mechanical gear structure during movement is clearly visible.\nIts mechanical teeth are slightly visible, neatly aligned and tightly closed, with both upper and lower teeth showing. Each tooth is triangular in shape, made of diamond material.\nThe tail fin has a woven metal wire structure, while the other fins are made of semi-transparent amber-colored glass with some subtle bubbles inside.\nThe eyes are multi-faceted rubies, with their reflected luster clearly visible.\nThe text \"f-is-h\" is clearly visible on the fish's body, with all letters in lowercase, paying attention to the hyphen positions.\nThe image is square, with the entire fish fully visible in the frame, centered in the picture, head facing right, with adequate white space so the composition doesn't feel cramped, with more space on the left and right sides. The background features faint steampunk-style gear textures.\nThe entire fish looks extremely cool. This is a high-definition image with very rich details throughout, possessing a unique texture and aesthetic quality. The image should not be too dark.", "note": "Showcases steampunk style with metallic materials.", "author": "@f-is-h", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 63, "title_en": "Emoji Cream Ice Cream", "title_cn": "Emoji奶油冰淇淋", "category": "food", "category_cn": "食物摄影", "prompt": "Generate an image: Transform 【🍓】 into a cream ice cream bar, with cream flowing in curves on top of the ice cream looking delicious and appetizing, floating at a 45-degree angle in the air, chibi 3D cute style, solid color background in a matching color scheme", "note": "Replace 【🍓】 with other Emojis.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 62, "title_en": "Cute Enamel Pin", "title_cn": "可爱珐琅别针", "category": "product", "category_cn": "产品展示图", "prompt": "Convert the person in the attached image into a cute enamel pin style. Use shiny metallic outlines and vibrant enamel fill colors. Do not add any extra elements. Square mockup format, white background.", "note": "Upload a photo of a person or object as the subject.", "author": "@gnrlyxyz", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 61, "title_en": "Fictional Tweet Screenshot (Einstein)", "title_cn": "虚构推文截图(爱因斯坦)", "category": "text_render", "category_cn": "文字渲染", "prompt": "A hyper-realistic tweet posted by Einstein right after completing the theory of relativity. It includes a selfie where the chalkboard and scrawled formulas are clearly visible in the background. Below the tweet, it shows that Nikola Tesla liked the content.", "note": "", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 60, "title_en": "Emoji Tufted Rug", "title_cn": "Emoji簇绒地毯", "category": "product", "category_cn": "产品展示图", "prompt": "Create an image showing a colorful, hand-tufted rug in the shape of the 🦖 emoji, laid on a minimalist floor background. The rug design is bold and playful, with a soft fluffy texture and thick-lined details. Shot from above with natural lighting, the overall style has a slightly quirky DIY aesthetic. Vibrant colors, cartoonish outlines, tactile and cozy material — similar to handmade tufted art rugs.", "note": "Replace 🦖 with other Emojis.", "author": "@gizakdag", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 59, "title_en": "Colorful Vector Art Poster", "title_cn": "彩色矢量艺术海报", "category": "poster", "category_cn": "海报设计", "prompt": "The location is \"London, United Kingdom,\" generate a colorful vector art poster featuring iconic landmarks, cultural symbols, and local elements arranged in a visually dynamic composition. Use bold, flat colors with clean lines and geometric shapes. Include the city name prominently in a stylish, modern typeface. The design should feel vibrant, celebratory, and suitable for travel or tourism promotion.", "note": "Replace city and country names to generate different city posters.", "author": "@michaelrabone", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 58, "title_en": "Cloud Art", "title_cn": "云朵艺术", "category": "scene", "category_cn": "风景/场景", "prompt": "Generate a photo: capturing a daytime scene where scattered clouds in the sky form the shape of [SUBJECT/OBJECT], positioned above [LOCATION].", "note": "Replace [SUBJECT/OBJECT] and [LOCATION]. E.g., Chinese dragon above the Great Wall.", "author": "@umesh_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 57, "title_en": "8-Bit Pixel Icons", "title_cn": "8位像素图标", "category": "logo", "category_cn": "Logo设计", "prompt": "Create a minimalist 8-bit pixel-style [🍔] logo, centered on a pure white background. Use a limited retro color palette with pixelated details, sharp edges, and clean blocky forms. The logo should be simple, iconic, and clearly recognizable in pixel art style — inspired by classic arcade game aesthetics.", "note": "Replace [🍔] with other Emojis or objects.", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 56, "title_en": "Mini 3D Building", "title_cn": "迷你3D建筑", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "3D chibi miniature style, a whimsical mini Starbucks cafe whose exterior looks like a giant takeaway coffee cup, complete with a lid and straw. The building has two floors, with large glass windows clearly showcasing the warm and exquisite interior design: wooden furniture, warm lighting, and busy baristas. On the street, cute little figurines are strolling or sitting, surrounded by benches, street lamps, and potted plants, creating a charming city corner. The overall style adopts an urban miniature landscape aesthetic, rich in detail and lifelike, with soft lighting presenting a leisurely afternoon feel.", "note": "Reference this prompt to generate similar prompts for other buildings.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 55, "title_en": "Creative Green Plant Pot", "title_cn": "创意绿植花盆", "category": "product", "category_cn": "产品展示图", "prompt": "A high-quality photo showcasing a cute ceramic [object/animal]-shaped planter with a smooth surface, filled with various vibrant succulents and green plants, including spiky haworthia, rosette-shaped echeveria, and delicate small white flowers. The planter has a friendly face, placed on a soft neutral background with diffused natural lighting, showcasing delicate textures and color contrasts, with a clean and highly minimalist composition.", "note": "Replace [object/animal] with a specific object, animal name, or emoji.", "author": "@azed_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 54, "title_en": "\"Extremely Ordinary\" iPhone Selfie", "title_cn": "极其普通的iPhone自拍", "category": "portrait", "category_cn": "人像/角色", "prompt": "Please draw an extremely ordinary and unremarkable iPhone selfie, with no clear subject or sense of composition, just like a casual snapshot. The photo has slight motion blur, with mild overexposure caused by uneven sunlight or indoor lighting. The angle is awkward, the composition is messy, and the overall image presents a deliberately mundane feel — as if the selfie was accidentally taken while pulling the phone out of a pocket. The subjects are Eason Chan and Nicholas Tse, at night, next to the Hong Kong Convention and Exhibition Centre, beside Victoria Harbour in Hong Kong.", "note": "Designed to generate a very casual, even somewhat failed snapshot style.", "author": "@jiamimaodashu", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 53, "title_en": "Emoji Inflatable Cushion", "title_cn": "Emoji充气靠垫", "category": "product", "category_cn": "产品展示图", "prompt": "Create a high-resolution 3D render of [🥹] designed as an inflatable, puffy object. The shape should be soft, round, and air-filled — similar to a plush balloon or inflatable toy. Use a smooth matte material with subtle fabric creases and stitching to enhance the inflated effect. The overall form should be slightly irregular and softly deflated, with soft shadows and soft lighting to emphasize volume and realism. Place it on a clean, minimalist background (light gray or light blue), and the overall style should remain playful yet sculptural.", "note": "Replace [🥹] with other Emojis.", "author": "@gizakdag", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 52, "title_en": "Paper-Craft Style Emoji Icons", "title_cn": "纸艺风格Emoji图标", "category": "illustration", "category_cn": "动漫/插画", "prompt": "A paper craft style \"🔥\" icon, floating on a pure white background. The emoji is handcrafted from colorful cut paper, with visible paper textures, creases, and layered shapes. It casts a soft shadow below, creating a sense of lightness and three-dimensionality. The overall design is simple, fun, and clean, with the image centered and surrounded by ample white space. Use soft studio lighting to highlight the paper's texture and edges.", "note": "Replace 🔥 with other Emojis.", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 51, "title_en": "Passport Entry Stamp", "title_cn": "护照入境印章", "category": "text_render", "category_cn": "文字渲染", "prompt": "Create a realistic passport page stamped with an entry stamp from [Beijing, China]. The stamp should have \"Welcome to Beijing\" written in bold English, designed in a circular or oval shape with a decorative border. The stamp should include the word \"ARRIVAL\" and a fictional date, such as \"April 16, 2025.\" Add a subtle outline of {the Forbidden City} as background detail within the stamp. Use dark blue or red ink with slight smudging to enhance realism. The stamp should be slightly tilted, as if hand-pressed. The passport page should show visible paper texture and security patterns.", "note": "Replace city, country, landmark, and date in brackets.", "author": "@M_w14_", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 50, "title_en": "Physical Destruction Effect Card", "title_cn": "物理破坏效果卡牌", "category": "card", "category_cn": "AI卡牌", "prompt": "A hyper-realistic, cinematic illustration depicting Lara Croft dynamically smashing through the border of an \"Archaeological Adventure\" trading card. She is mid-jump or swinging on a rope, wearing her iconic adventure gear, possibly firing dual pistols, with muzzle flashes helping to shatter the card's ancient stone-carved border, creating visible dimensional break effects around the breach — such as energy cracks and spatial distortions — sending dust and debris flying everywhere. Her body surges forward with vigor, with distinct motion depth, breaking through the card's flat plane. The card interior (background) depicts dense jungle ruins or a trap-filled ancient tomb interior. Card debris mixes with crumbling stone, flying vines, ancient coin fragments, and spent shell casings. The \"Archaeological Adventure\" title and \"Lara Croft\" name (with a stylized artifact icon) are visible on the remaining, crack-covered and weathered portions of the card. Adventurous, dynamic lighting highlights her athletic ability and the dangerous environment.", "note": "Core terms: \"dimensional break effects\" and \"motion depth.\"", "author": "@op7418", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 49, "title_en": "Fashion Magazine Cover Style", "title_cn": "时尚杂志封面风格", "category": "poster", "category_cn": "海报设计", "prompt": "A beautiful woman wearing a pink cheongsam (qipao), with an exquisite floral headpiece, her hair adorned with colorful flowers, and an elegant white lace collar around her neck. One of her hands is gently holding several large butterflies. The overall shooting style presents a high-definition detailed texture, similar to a fashion magazine cover design, with the text \"FASHION DESIGN\" placed at the top center of the photo. The background uses a simple solid light gray to highlight the main subject.", "note": "", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 48, "title_en": "Voxel-Style 3D Icon Conversion", "title_cn": "体素风格3D图标转换", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Convert the image/description/emoji into a voxel 3D icon matching the reference image, Octane render, 8k", "note": "Upload a voxel style reference image + original icon to be converted.", "author": "@BrettFromDJ", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 47, "title_en": "Keyboard ESC Keycap Micro Diorama", "title_cn": "键盘ESC键帽微缩场景", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "A hyper-realistic isometric 3D render showing a miniature computer workspace inside a translucent mechanical keyboard keycap, specifically placed on the ESC key of a real matte-surface mechanical keyboard.\nInside the keycap, a tiny figure wearing a comfortable, textured hoodie sits in a modern ergonomic chair, focused on working at a glowing hyper-realistic computer screen. The space is filled with realistic miniature tech accessories: a real-material desk lamp, monitors with reflective effects, tiny speaker grilles, tangled cables, and ceramic mugs.\nThe base of the scene is composed of soil, rocks, and moss, with photographic-quality material textures and natural imperfections. The lighting inside the keycap simulates early morning natural sunlight, casting soft shadows and warm tones; while the exterior of the keycap is affected by cool-toned reflections from the surrounding keyboard environment.\nThe \"ESC\" lettering is etched on top of the translucent keycap with a subtle frosted glass effect — only faintly visible depending on the viewing angle.\nThe surrounding keys such as F1, Q, Shift, and CTRL are clearly visible with realistic material textures and lighting. The overall image appears as if captured by a high-end smartphone camera, with shallow depth of field, perfect white balance, and cinematic detail.", "note": "", "author": "@egeberkina", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 46, "title_en": "Happy Capsule Making", "title_cn": "快乐胶囊制作", "category": "product", "category_cn": "产品展示图", "prompt": "Title (large text): Fast-Acting Happy Capsule\nA small pill capsule with Starbucks green on top and transparent on the bottom, printed with the Starbucks logo, filled with many coffee beans inside\nDescription (small text): Take when feeling sad or upset, three times a day, two capsules per dose", "note": "Creative product concept combining brand elements.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 45, "title_en": "3D Chibi University Mascot", "title_cn": "3D Q版大学吉祥物", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Draw a personified 3D chibi girl character for {Northwestern Polytechnical University}, reflecting the school's {aviation, aerospace, and marine (three navigation)} characteristics", "note": "Replace university name and characteristics.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 44, "title_en": "RPG-Style Character Card", "title_cn": "RPG风格角色卡牌", "category": "card", "category_cn": "AI卡牌", "prompt": "Create an RPG collectible-style digital character card. The character is set as a {Programmer}, standing confidently with tools or symbols related to their profession. Rendered in 3D cartoon style with soft lighting, showcasing a distinctive personality. Add skill bars or attribute values, such as [Skill1 +x], [Skill2 +x], e.g., Creativity +10, UI/UX +8. Add a title banner at the top of the card and a character nameplate at the bottom. The card border should be clean and sharp, like a real collectible figurine packaging box. The background should match the profession's theme. Use warm highlights and colors that match the profession's characteristics for the color scheme.", "note": "Replace {Programmer} with other professions.", "author": "@berryxia_ai", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 43, "title_en": "Cute Chibi Matryoshka Doll", "title_cn": "Q版俄罗斯套娃", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the person in the image into cute chibi Russian nesting dolls, five in total from large to small, placed on an elegant wooden table, landscape 3:2 ratio", "note": "A portrait photo is needed as the conversion subject.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 42, "title_en": "3D Chibi Couple Crystal Ball", "title_cn": "3D Q版情侣水晶球", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Convert the people in the attached image into a crystal ball scene. Overall environment: the crystal ball is placed on a table by the window, with a blurred background and warm tones. Sunlight shines through the ball, casting golden specks of light that illuminate the surrounding darkness. Inside the crystal ball: the characters are in cute chibi 3D style, gazing at each other with eyes full of love.", "note": "Upload a couple's photo or another portrait photo.", "author": "@balconychy", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 41, "title_en": "Micro Diorama Scene", "title_cn": "微缩场景模型", "category": "scene", "category_cn": "风景/场景", "prompt": "Miniature diorama scene presentation, using tilt-shift photography techniques, depicting a chibi scene of [Sun Wukong's Three Battles with the White Bone Demon]", "note": "Replace scene in brackets with other Chinese stories.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 40, "title_en": "Japanese-Style Two-Panel Manga", "title_cn": "日式双格漫画", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Create a Japanese cute-style two-panel manga, arranged vertically, theme: A girl president's workday.\n\nCharacter design: Convert the uploaded attachment into a Japanese cute-style cartoon girl, preserving all details from the original image, such as clothing (suit), hairstyle (bright golden yellow), facial features, etc.\n\nFirst panel:\nExpression: Looking aggrieved and dejected, resting chin on one hand\nText bubble: \"What do I do! He won't take my call! (;´д`)\"\nScene: Warm-toned office, American flag behind her, a pile of hamburgers on the desk, a vintage red rotary phone, character on the left side, phone on the right side.\n\nSecond panel:\nExpression: Gritting teeth, furious, face flushed red\nAction: Slamming the desk hard, hamburgers bouncing up\nText bubble: \"Hmph! Double the tariffs! Not talking to me is their loss! (`д´)\"\nScene: Same as first panel, but in total disarray.\n\nOther notes:\nText uses a clean and cute handwritten font, overall style is cute and fun.\nComposition should be full and vivid, with enough space reserved for text display, with appropriate whitespace.\nImage ratio 2:3.\nOverall colors should be vibrant, emphasizing the cartoon style.", "note": "Upload a portrait photo as reference.", "author": "@hellokaton", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 39, "title_en": "Fantasy Cartoon Illustration", "title_cn": "奇幻卡通插画", "category": "illustration", "category_cn": "动漫/插画", "prompt": "A cartoon-style character with a computer monitor head showing a smiley face, wearing gloves and boots, happily jumping through a glowing blue circular portal. The background is a lush fantasy forest landscape. The forest is rich in detail, with tall trees, mushrooms, flowers, a tranquil river, floating islands, and an atmospheric starry night sky with multiple moons. The overall style uses bright vibrant colors with soft lighting effects, in a fantasy illustration style.", "note": "", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 38, "title_en": "Hand-Drawn Infographic Card", "title_cn": "手绘信息图卡片", "category": "text_render", "category_cn": "文字渲染", "prompt": "Create a hand-drawn style infographic card in 9:16 portrait ratio. The card has a clear theme, with a paper-textured beige or off-white background, and the overall design embodies a rustic, warm hand-drawn aesthetic.\n\nAt the top of the card, use bold red-and-black contrasting large brush calligraphy to highlight the title and attract visual focus. All text content uses Chinese calligraphy, with the overall layout divided into 2 to 4 clear sections, each expressing core points in short, refined Chinese phrases. The font maintains the flowing rhythm of calligraphy, both legible and artistic. Leave appropriate whitespace around the edges.\n\nThe card is accented with simple, interesting hand-drawn illustrations or icons, such as characters or symbolic elements, to enhance visual appeal and inspire reader reflection and resonance. The overall layout pays attention to visual balance, with sufficient white space to ensure the image is clean, clear, and easy to read and understand.", "note": "Add your own text content at the end of the prompt.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 37, "title_en": "Soft-Style 3D Advertisement", "title_cn": "柔和3D广告", "category": "advertising", "category_cn": "广告设计", "prompt": "A pastel 3D cartoon-style [brand product] sculpture, made of smooth clay-like textures and vibrant pastel colors, placed in a minimalist isometric scene that complements the product features, with clean composition, soft lighting, subtle shadows, and the product logo and a three-word slogan clearly displayed below.", "note": "Replace [brand product] with a specific product description.", "author": "@op7418", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 36, "title_en": "Minimalist 3D Illustration (Markdown Format)", "title_cn": "极简3D插画(Markdown格式)", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Draw a toilet:\n\nArt Style Introduction: Minimalist 3D Illustration\nVisual Elements\nShape Language: Rounded edges, smooth and soft forms, using simplified geometric shapes.\nColors: Primary colors: Soft beige, light gray, warm orange. Accent color: Warm orange for focal elements. Light and shadow treatment: Soft gradients, smooth transitions, avoiding strong shadows and highlights.\nLighting: Type: Soft, diffused lighting. Light direction: From above, slightly to the right. Shadow style: Subtle and diffused, no sharp or high-contrast shadows.\nMaterials: Surface texture: Matte, smooth surfaces with subtle tonal variations. Reflectivity: Low or none, avoiding obvious glossiness.\nComposition: Object presentation: Single, centered object with ample negative space around it. Perspective: Slightly tilted angle, showing moderate three-dimensionality without noticeable depth of field effects. Background: Solid color, low saturation, harmonious with the subject without distracting from it.\nTypography: Font style: Minimalist, sans-serif font. Text position: Lower left corner, small and understated. Font color: Gray, low contrast with the background.\nRendering Style: Technique: 3D rendering with a simplified low-poly style. Detail level: Medium detail, focusing on shape and color, avoiding complex textures and details.", "note": "Replace 'toilet' with any object. Uses Markdown-style structured prompt.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 35, "title_en": "Fluffy Pumpkin Lantern", "title_cn": "毛绒南瓜灯", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Transform a simple flat vector icon [pumpkin emoji] into a soft, three-dimensional, fluffy cute object. The entire form is completely covered in dense fur, with extremely realistic fur texture and soft shadows. The object is centered and floating in a clean light gray background, appearing lightweight and buoyant. The overall style is surreal, tactile and modern, creating a cozy and playful visual feeling. Studio-grade lighting, high-resolution rendering, 1:1 ratio.", "note": "Replace [pumpkin emoji] with other emojis or objects.", "author": "gizakdag", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 34, "title_en": "Hand-Drawn Infographic Card (Cognition)", "title_cn": "手绘信息图卡片(认知)", "category": "text_render", "category_cn": "文字渲染", "prompt": "Create a hand-drawn style infographic card in 9:16 portrait ratio. The card has a clear theme, with a paper-textured beige or off-white background, and the overall design embodies a rustic, warm hand-drawn aesthetic.\n\nAt the top of the card, use bold red-and-black contrasting large brush calligraphy to highlight the title and attract visual focus. All text content uses Chinese calligraphy, with the overall layout divided into 2 to 4 clear sections, each expressing core points in short, refined Chinese phrases. The font maintains the flowing rhythm of calligraphy, both legible and artistic.\n\nThe card is accented with simple, interesting hand-drawn illustrations or icons, such as characters or symbolic elements, to enhance visual appeal and inspire reader reflection and resonance. The overall layout pays attention to visual balance, with sufficient white space to ensure the image is clean, clear, and easy to read and understand.\n\n\"Cognition\" determines your ceiling \"Circle\" determines your opportunities\n- You can't earn money beyond your \"cognition\", - Nor encounter opportunities outside your \"circle\".", "note": "Replace the text content at the end.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 33, "title_en": "Family Wedding Photo", "title_cn": "家庭婚礼照片", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Convert the people in the photo into chibi 3D characters. Parents in wedding attire, children as beautiful flower bearers. Parents in Western wedding attire, father in a tuxedo, mother in a wedding dress. Children holding bouquets. The background is an arch made of colorful flowers. Everything except the characters is realistic while the characters are 3D chibi style. The whole scene is placed inside a picture frame.", "note": "Upload a family photo.", "author": "@balconychy", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 32, "title_en": "Fold-Out Paper Sculpture Pop-Up Book", "title_cn": "折叠纸雕立体书", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Multi-layered folding paper-cut pop-up book, placed on a desk, with a clean background to highlight the subject. The book presents a three-dimensional pop-up book style, in 3:2 landscape ratio. The opened pages depict the scene of [Demon Child Nezha Battling Ao Bing], with all elements finely foldable and assemblable, presenting a realistic and delicate paper-folding texture. The composition uniformly uses a frontal perspective, with an overall visual style that is dreamy and beautiful, colorful and splendid, full of fantastical and vivid storytelling atmosphere.", "note": "Modify the scene description inside the brackets.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 31, "title_en": "Anime Sticker Collection", "title_cn": "动漫贴纸合集", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Naruto stickers", "note": "Simple prompt for generating anime sticker collections.", "author": "@richardchang", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 30, "title_en": "35mm Film-Style Floating Island", "title_cn": "35mm胶片风飞行岛", "category": "scene", "category_cn": "风景/场景", "prompt": "35mm film-style photo: Moscow floating on a flying island in the sky.", "note": "Replace city name for different scenes.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 29, "title_en": "Famous Painting Characters OOTD", "title_cn": "名画人物穿搭", "category": "portrait", "category_cn": "人像/角色", "prompt": "Generate different profession-style OOTDs for the person in the image, with fashionable outfits and accessories, a solid-color background matching the character's color scheme, chibi 3D style, C4D rendering, preserving facial features, keeping all poses consistent, with long slender legs for the character proportions\n\nComposition: 9:16\nTop text: OOTD, left side shows the character's OOTD chibi image, right side shows individual outfit pieces\n\nLet's start with the first profession: Fashion Designer", "note": "Upload a portrait image as reference.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 28, "title_en": "Flat Sticker Design", "title_cn": "扁平贴纸设计", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Design this photo as a minimalist flat illustration style chibi sticker with thick white border, preserving the character's features, the style should be cute, the character should extend beyond the circular area border, the circular area should be a solid color without 3D effect, transparent background.", "note": "Upload a clear portrait photo.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 27, "title_en": "Chibi Emoji Pack Making", "title_cn": "Q版表情包制作", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Create a brand new set of chibi stickers, with six unique poses, featuring the user's likeness as the main character:\n1. Making a peace sign with both hands, playfully winking;\n2. Teary-eyed with slightly trembling lips, showing a cute crying expression;\n3. Arms wide open, making an enthusiastic big hug gesture;\n4. Lying on side sleeping, leaning on a mini pillow, with a sweet smile;\n5. Confidently pointing forward with hand, surrounded by sparkling effects;\n6. Blowing a kiss gesture, with heart emojis floating around.\nMaintain chibi aesthetic style: exaggerated expressive big eyes, soft facial lines, lively and playful short black hairstyle, paired with white outfit featuring a bold neckline design, using a vibrant red background, decorated with stars or confetti elements. Leave appropriate white space around the edges.\nAspect ratio: 9:16", "note": "Upload a clear headshot photo.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 26, "title_en": "Famous Painting Characters Cereal Ad", "title_cn": "名画人物麦片广告", "category": "advertising", "category_cn": "广告设计", "prompt": "\"Master Oats\": Based on the character features in the photo I uploaded, generate a suitable oatmeal pairing for them (such as vegetables, fruits, yogurt, whole grains, etc.) and packaging design, then generate an ad cover featuring them as the cereal box cover character along with the corresponding oatmeal pairing. The character should maintain their features, in a cute chibi 3D style with C4D rendering. The setting where the cereal is placed should also match the theme, such as a kitchen, supermarket, or minimalist design counter, etc. First establish the concept, then generate the image.", "note": "Upload a portrait image as reference.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 25, "title_en": "Minimalist 3D Illustration (JSON)", "title_cn": "极简3D插画(JSON配置)", "category": "3d_render", "category_cn": "3D渲染/材质", "prompt": "Generate a toilet using the following JSON configuration file:\n{\n  \"art_style_profile\": {\n    \"style_name\": \"Minimalist 3D Illustration\",\n    \"visual_elements\": {\n      \"shape_language\": \"Rounded edges, smooth and soft forms with simplified geometry\",\n      \"colors\": {\n        \"primary_palette\": [\"Soft beige, light gray, warm orange\"],\n        \"accent_colors\": [\"Warm orange for focal elements\"],\n        \"shading\": \"Soft gradients with smooth transitions, avoiding harsh shadows or highlights\"\n      },\n      \"lighting\": {\n        \"type\": \"Soft, diffused lighting\",\n        \"source_direction\": \"Above and slightly to the right\",\n        \"shadow_style\": \"Subtle and diffused, no sharp or high-contrast shadows\"\n      },\n      \"materials\": {\n        \"surface_texture\": \"Matte, smooth surfaces with subtle shading\",\n        \"reflectivity\": \"Low to none, avoiding glossiness\"\n      },\n      \"composition\": {\n        \"object_presentation\": \"Single, central object displayed in isolation with ample negative space\",\n        \"perspective\": \"Slightly angled, giving a three-dimensional feel without extreme depth\",\n        \"background\": \"Solid, muted color that complements the object without distraction\"\n      },\n      \"typography\": {\n        \"font_style\": \"Minimalistic, sans-serif\",\n        \"text_placement\": \"Bottom-left corner with small, subtle text\",\n        \"color\": \"Gray, low-contrast against the background\"\n      },\n      \"rendering_style\": {\n        \"technique\": \"3D render with simplified, low-poly aesthetics\",\n        \"detail_level\": \"Medium detail, focusing on form and color over texture or intricacy\"\n      }\n    },\n    \"purpose\": \"To create clean, aesthetically pleasing visuals that emphasize simplicity, approachability, and modernity.\"\n  }\n}", "note": "Replace 'toilet' with any object. Uses JSON format for precise control.", "author": "@0xdlk", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 24, "title_en": "Funko Pop Figure Making", "title_cn": "Funko Pop手办制作", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the person in the photo into the style of a Funko Pop figure packaging box, presented in isometric perspective, with the title \"JAMES BOND\" labeled on the packaging box. The packaging box displays the character from the photo, accompanied by the character's essential items (pistol, watch, suit, others). Additionally, next to the packaging box, the actual figure itself should be displayed with a realistic, lifelike rendering style.", "note": "Upload a half-body or full-body clear photo.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 23, "title_en": "\"Titanic\" Recreation", "title_cn": "泰坦尼克号经典重现", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the characters in the attached image into cute chibi 3D style.\nScene: At the very tip of the bow of a luxury cruise ship, with a pointed bow.\nThe man stands behind the woman at the bow of the Titanic, with his arms around her waist, while the woman extends both arms wearing a dress, facing the wind, with freedom and joy radiating from her face.\nThe sky displays warm dusk tones, with the sea stretching out beneath the ship.\nEverything except the characters in chibi 3D style should be realistic.", "note": "Upload a couple's photo.", "author": "@balconychy", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 22, "title_en": "Xiaohongshu Cover", "title_cn": "小红书封面", "category": "poster", "category_cn": "海报设计", "prompt": "Draw an image: Create a Xiaohongshu (Little Red Book) cover.\nRequirements:\nHave enough appeal to attract users to click;\nUse eye-catching fonts, choose distinctive fonts;\nText sizes should be tiered by importance, reflecting the logical structure of the copy;\nTitle should be at least 2x the size of regular text;\nLeave white space between text paragraphs.\nOnly use appropriate icons or images to add visual hierarchy while minimizing distraction.\n\nCopy: Breaking News! ChatGPT Just Got Even More Powerful!\nMulti-task processing is stronger\nCoding ability is better\nCreativity off the charts\nCome try it out!\n\nImage ratio 9:16", "note": "Replace the copy content for different covers.", "author": "@balconychy", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 21, "title_en": "Chibi Character Sticker Pack", "title_cn": "Q版角色表情包", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Please create a set of chibi sticker packs featuring [the character from the reference image] as the main character, 9 in total, arranged in a 3x3 grid.\nDesign requirements:\n- Transparent background.\n- 1:1 square composition.\n- Unified chibi Ghibli cartoon style with vibrant colors.\n- Each sticker should have different actions, expressions, and content, conveying diverse emotions like \"sassy, cheeky, cute, going crazy\" etc.\n- Each sticker should have a complete figure with no missing parts.\n- Each sticker should have a uniform white outline for a sticker effect.\n- No extra, detached elements in the image.\n- Strictly no text, or ensure text content is accurate (prefer no text).", "note": "Upload a character image as the main reference.", "author": "@leon_yuan2001", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 20, "title_en": "Figure & Real Person Side by Side", "title_cn": "手办与真人同框", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "In a casual smartphone snapshot style, an anime action figure of [Jackie Chan] is placed on the desk, with exaggerated cool poses and full equipment. Meanwhile, the real-world counterpart also appears in the frame, striking a similar pose to the figure, creating a fun contrast between the action figure and the real person in the same shot. The overall composition is harmonious and natural, conveying a warm and lively visual experience.", "note": "Replace [Jackie Chan] with any character name.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 19, "title_en": "Country Diorama in Toy Box", "title_cn": "国家微缩玩具箱", "category": "scene", "category_cn": "风景/场景", "prompt": "A hyper-realistic overhead photograph showing a 3D-printed diorama inside a beige cardboard box, with the lid held open by two human hands. The interior of the box reveals a miniature landscape of [Country Name], featuring iconic landmarks, terrain, architecture, rivers, vegetation, and numerous tiny detailed figurines. The diorama is filled with vivid, geographically accurate elements, all crafted in a tactile, toy-like style using matte 3D-printed textures with visible print layer lines. At the top, the inside of the box lid displays \"[Country Name]\" in large, colorful raised plastic letters — each letter a different bright color. The lighting is warm and cinematic, highlighting textures and shadows, creating a sense of realism and charm, as if the viewer is opening a magical miniature version of a country.", "note": "Replace [Country Name] with the specific country name.", "author": "@TheRelianceAI", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 18, "title_en": "Pixar 3D Style", "title_cn": "皮克斯3D风格", "category": "portrait", "category_cn": "人像/角色", "prompt": "Redraw this photo in Pixar 3D style", "note": "Upload a photo of a person or other subject.", "author": "AnimeAI", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 17, "title_en": "Retro CRT Computer Boot Screen", "title_cn": "复古CRT电脑开机画面", "category": "text_render", "category_cn": "文字渲染", "prompt": "Retro CRT computer boot screen, finally displaying ASCII art in the shape of [shape or logo].", "note": "Replace [shape or logo] with a specific description.", "author": "@Gdgtify", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 16, "title_en": "Anime-Style Badge", "title_cn": "动漫风格徽章", "category": "product", "category_cn": "产品展示图", "prompt": "Based on the character in the attachment, generate a photo of an anime-style badge, requirements:\nMaterial: Tassel\nShape: Circular\nMain subject: A hand holding the badge", "note": "Upload a character photo as reference for the badge design.", "author": "@Alittlefatwhale", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 15, "title_en": "Satirical Poster Generation", "title_cn": "讽刺海报生成", "category": "poster", "category_cn": "海报设计", "prompt": "Generate a satirical poster for me: GPT 4o is dominating so hard, everyone should quit image AI and go deliver food instead", "note": "Replace with your own satirical theme.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 14, "title_en": "One Piece Themed Figure Making", "title_cn": "海贼王主题手办制作", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the person in the photo into a One Piece anime-themed action figure packaging box style, presented in isometric perspective. The packaging box displays a character designed in One Piece anime art style based on the person in the photo, accompanied by daily essential items (pistol, watch, suit, and leather shoes). Additionally, next to the packaging box, the actual figure itself should be displayed with a realistic, lifelike rendering style.", "note": "Upload a half-body or full
