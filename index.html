-body photo.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 13, "title_en": "3D Chibi Style", "title_cn": "3D Q版风格转换", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the characters in the scene into 3D chibi style while keeping the original scene layout and costume styling unchanged.", "note": "Upload a photo.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 12, "title_en": "3D Couple Jewelry Box Figurine", "title_cn": "3D情侣珠宝盒手办", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Based on the content of the photo, create an exquisitely detailed, adorably cute 3D rendered collectible figurine, placed in a soft pastel-toned, warm and romantic display box. The display box is in light cream color with soft gold accents, resembling an elegant portable jewelry box. Upon opening the lid, a warm romantic scene is revealed: two chibi characters are sweetly gazing at each other. The box top is engraved with the words \"FOREVER TOGETHER\", surrounded by delicate little stars and heart patterns.\nInside the box stands the woman from the photo, holding a small bouquet of white flowers. Beside her is her partner, the man from the photo. Both have large, sparkling, expressive eyes and soft, warm smiles, conveying deep affection and charming presence.\nBehind them is a round window through which you can see a sunny classical Chinese town skyline with gently floating clouds. The interior of the box is lit with warm, soft lighting, with flower petals floating in the background for atmosphere. The entire display box and characters share an elegant, harmonious color palette, creating a luxurious and dreamy miniature keepsake scene.\nSize: 9:16", "note": "Upload a couple's photo.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 11, "title_en": "PS2 Game Cover (GTA x Shrek)", "title_cn": "PS2游戏封面", "category": "poster", "category_cn": "海报设计", "prompt": "Can you create an image of a PS2 game cover? The title is \"Grand Theft Auto: Far Far Away\". It's a GTA-style game set in the Shrek universe.", "note": "", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 10, "title_en": "Satirical Comic Generation", "title_cn": "讽刺漫画生成", "category": "illustration", "category_cn": "动漫/插画", "prompt": "A satirical cartoon-style illustration in retro American comic style. The background is a multi-tiered shelf filled with identical red baseball caps. The front of the caps features the large slogan \"MAKE AMERICA GREAT AGAIN\", while the side has a white label reading \"MADE IN CHINA\". The close-up perspective focuses on one red baseball cap. At the bottom of the image is a price tag — the original price \"$50.00\" is crossed out with a thick black X and changed to \"$77.00\". The color palette uses nostalgic earth-yellow and dark-red tones, with shadow treatment giving a 90s retro print quality. The overall composition is exaggerated and satirical, carrying an ironic commentary on political consumerism.", "note": "", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 9, "title_en": "Minimalist Futuristic Poster", "title_cn": "极简未来主义海报", "category": "poster", "category_cn": "海报设计", "prompt": "A vertical (3:4) 4K resolution minimalist futurist exhibition poster with an ultra-light cool gray #f4f4f4 background.\n\nAt the center of the poster is a fluid 3D metaball in the shape of a [3D Coca-Cola classic soda bottle], with frosted glass material and fine granular noise texture. Fluid gradient: Coca-Cola red #E41C23 → pearl white #FFFFFF, presenting a silky glass-like quality.\n\nHigh-position softbox diffused lighting, casting long and soft colored shadows with faint halos.\n\nThe fluid overlaps the text, and the obscured letters appear with slight Gaussian blur through the frosted glass.\n\n· Main title \"Coca-Cola\" classic red logo positioned in the center, partially obscured by the fluid element; the obscured letters appear with slight Gaussian blur through the frosted glass.\n\n· Subtitle, Modern sans-serif bold all-caps pure black font: \"TASTE THE FEELING\" positioned below the main title, also partially covered by the fluid with blur effect, while the rest remains sharp.\n\nOverall clean white space, balanced composition, sharp focal points, HDR high dynamic range.", "note": "Replace [3D Coca-Cola classic soda bottle] with other objects for different themes.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 8, "title_en": "LEGO Collectible", "title_cn": "乐高收藏品", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Based on the photo I uploaded, generate a vertical ratio photo using the following prompt:\nClassic LEGO minifigure style, a miniature scene — an animal standing next to me. The animal's color scheme matches mine.\nPlease create this animal based on your understanding of me (you can choose any animal you think suits me, whether real, surreal, or fantastical, as long as you feel it matches my vibe).\nThe entire scene is set inside a transparent glass cube with minimalist staging.\nThe miniature scene's base is matte black with silver accents, minimal and stylish.\nThe base features an elegantly engraved label plate with refined serif font, displaying the animal's name.\nThe base design also cleverly incorporates biological classification information similar to natural history museum displays, presented in finely etched style.\nThe overall composition resembles a high-end collectible art piece: meticulously crafted, curatorially presented, with detailed lighting.\nComposition emphasizes balance. Background is a gradient from dark to light (colors selected based on the dominant color palette).", "note": "Upload a half-body or full-body solo photo.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 7, "title_en": "Personalized Room Design", "title_cn": "个性化房间设计", "category": "scene", "category_cn": "风景/场景", "prompt": "Generate my room design (bed, bookshelf, sofa, plants, computer desk and computer), with paintings hanging on the wall, and a city night view outside the window. Cute 3D style, C4D rendering, isometric view.", "note": "Customize room elements as needed.", "author": "@ZHO_ZHO_ZHO", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 6, "title_en": "Character Portal Crossing", "title_cn": "角色穿越传送门", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "The 3D chibi version of the character in the photo passes through a portal, holding the viewer's hand, dynamically looking back while pulling the viewer forward. The background outside the portal is the viewer's real world — a typical programmer's study with a desk, monitor, and laptop. Inside the portal is the character's 3D chibi world, with details referencing the photo, overall in blue tones, forming a stark contrast with the real world. The portal emits mysterious blue and purple hues, serving as a perfect elliptical frame between the two worlds, positioned in the center of the image. Shot from a third-person camera angle, showing the viewer's hand being pulled into the character's world. 2:3 aspect ratio.", "note": "Upload a half-body or full-body solo photo.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 5, "title_en": "Ghibli Style", "title_cn": "吉卜力风格", "category": "illustration", "category_cn": "动漫/插画", "prompt": "Redraw this photo in Ghibli style", "note": "If encountering content policy violations, add: If there is any inappropriate content in the background, it can be modified or removed.", "author": "AnimeAI", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 4, "title_en": "3D Chibi Chinese Wedding", "title_cn": "3D Q版中式婚礼", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the two people in the photo into chibi 3D characters in a traditional Chinese wedding, with dominant red colors, and a \"囍\" (double happiness) paper-cut style pattern as the background. Costume requirements: Realistic style — the man wears a changpao magua (traditional long robe and mandarin jacket), mainly in red, embroidered with golden dragon patterns to convey nobility and grandeur, with a large red flower pinned to the chest, symbolizing celebration and good fortune. The woman wears a xiuhe fu (traditional Chinese wedding dress), also in red as the base color, adorned with exquisite gold floral patterns and phoenix embroidery, showcasing elegance and splendor, with floral hair accessories adding a gentle and graceful touch. Both outfits are classic traditional Chinese wedding attire, carrying blessings for a happy marriage. Headpiece requirements: Man: Chinese zhuangyuan (scholar's) hat, mainly red, decorated with gold patterns, with an exquisite gold ornament on top, exuding traditional scholarly dignity. Woman: Phoenix crown (fengguan) design, with red flowers as the centerpiece, paired with three-dimensional gold decorations and dangling tassels, luxurious and rich with classical charm.", "note": "Upload a couple's photo.", "author": "@balconychy", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 3, "title_en": "Retro Propaganda Poster", "title_cn": "复古宣传海报", "category": "poster", "category_cn": "海报设计", "prompt": "Vintage propaganda poster style, with prominent Chinese text, and a red-yellow radial pattern background. In the center of the image is a beautiful young woman, drawn in an exquisite retro style, smiling, elegant and approachable. The theme is a GPT latest AI image service promotional ad, emphasizing 'Amazing price 9.9/image', 'Suitable for various scenarios, image blending, partial repaint', '3 revisions per submission', 'AI direct output, no modifications needed'. The bottom prominently reads 'If interested, click \"I want it\" at the bottom right', with a finger clicking a button gesture drawn at the bottom right, and the OpenAI logo displayed at the bottom left.", "note": "", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": false}, {"id": 2, "title_en": "3D Chibi Character Dimensional Photo Frame", "title_cn": "3D Q版角色立体相框", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the characters in the scene into 3D chibi style, placed on a Polaroid photo being held by a hand, with the character stepping out of the Polaroid photo, creating a visual effect of breaking through the 2D photo frame into the 2D real space.", "note": "Upload a half-body or full-body solo photo.", "author": "@dotey", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}, {"id": 1, "title_en": "Chibi Proposal Scene", "title_cn": "Q版求婚场景", "category": "3d_cute", "category_cn": "3D/手办/潮玩", "prompt": "Transform the two people in the photo into chibi 3D characters, change the scene to a proposal, replace the background with an arch made of elegant colorful petals, use romantic colors for the background, with rose petals scattered on the ground. Only the characters use chibi 3D style; all other environmental elements use realistic style.", "note": "Upload a couple's photo.", "author": "@balconychy", "source": "moosl/awsome-gpt-image-2-prompts", "needs_ref": true}];

  el.innerHTML = `<div class="stat"><strong>${PROMPTS.length}</strong>条提示词</div>`
    + `<div class="stat"><strong>${Object.keys(cats).length}</strong>个分类</div>`
    + `<div class="stat"><strong>${PROMPTS.filter(p=>p.needs_ref).length}</strong>条需要参考图</div>`;
}

function renderFilters() {
  const cats = {};
  PROMPTS.forEach(p => { cats[p.category_cn] = (cats[p.category_cn]||0)+1; });
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const el = document.getElementById("filters");
  let html = `<button class="filter-btn active" data-cat="">全部<span class="count">${PROMPTS.length}</span></button>`;
  sorted.forEach(([cat,count]) => {
    html += `<button class="filter-btn" data-cat="${cat}">${cat}<span class="count">${count}</span></button>`;
  });
  el.innerHTML = html;
}

function renderCards() {
  const filtered = PROMPTS.filter(p => {
    if (activeCategory && p.category_cn !== activeCategory) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const searchable = (p.title_cn + " " + p.title_en + " " + p.prompt + " " + p.category_cn + " " + p.author + " " + (p.note||"")).toLowerCase();
      return searchable.includes(q);
    }
    return true;
  });

  const grid = document.getElementById("grid");
  const noResults = document.getElementById("noResults");

  if (filtered.length === 0) {
    grid.innerHTML = "";
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  grid.innerHTML = filtered.map(p => {
    const color = CAT_COLORS[p.category_cn] || "#58a6ff";
    const promptEscaped = escapeHtml(p.prompt);
    const noteHtml = p.note ? `<div class="card-note">${escapeHtml(p.note)}</div>` : "";
    const refBadge = p.needs_ref ? `<span class="ref">需上传参考图</span>` : "";
    return `
    <article class="card" data-id="${p.id}">
      <div class="card-header">
        <span class="card-tag" style="background:linear-gradient(135deg,${color},${color}88)">${p.category_cn}</span>
        <span class="card-id">#${p.id}</span>
      </div>
      <div class="card-title-cn">【${p.category_cn} | ${p.title_cn}】</div>
      <div class="card-title-en">${escapeHtml(p.title_en)}</div>
      <div class="card-prompt">${promptEscaped}</div>
      <div class="card-footer">
        <div class="card-meta">
          <span>${p.author}</span>
          ${refBadge}
        </div>
        <button class="copy-btn" data-prompt="${btoa(unescape(encodeURIComponent(p.prompt)))}">
          <span>&#128203;</span> 复制
        </button>
      </div>
      ${noteHtml}
    </article>`;
  }).join("");
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/\n/g,"<br>");
}

function bindEvents() {
  // Search
  const searchInput = document.getElementById("searchInput");
  let debounceTimer;
  searchInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      searchQuery = searchInput.value.trim();
      renderCards();
    }, 200);
  });

  // Filters
  document.getElementById("filters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.cat || null;
    renderCards();
  });

  // Copy
  document.getElementById("grid").addEventListener("click", e => {
    const btn = e.target.closest(".copy-btn");
    if (!btn) return;
    const text = decodeURIComponent(escape(atob(btn.dataset.prompt)));
    navigator.clipboard.writeText(text).then(() => {
      btn.innerHTML = "<span>&#10003;</span> 已复制";
      btn.classList.add("copied");
      showToast();
      setTimeout(() => {
        btn.innerHTML = "<span>&#128203;</span> 复制";
        btn.classList.remove("copied");
      }, 2000);
    }).catch(() => {
      // Fallback
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      btn.innerHTML = "<span>&#10003;</span> 已复制";
      btn.classList.add("copied");
      showToast();
      setTimeout(() => {
        btn.innerHTML = "<span>&#128203;</span> 复制";
        btn.classList.remove("copied");
      }, 2000);
    });
  });

  // Scroll to top
  const scrollBtn = document.getElementById("scrollTop");
  window.addEventListener("scroll", () => {
    scrollBtn.classList.toggle("show", window.scrollY > 400);
  });
  scrollBtn.addEventListener("click", () => {
    window.scrollTo({top:0,behavior:"smooth"});
  });
}

function showToast() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1500);
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
