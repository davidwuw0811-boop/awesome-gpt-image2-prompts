<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Image 2 提示词大全 | 490条提示词 | Prompt Collection</title>
<meta name="description" content="490条精选GPT Image 2提示词，支持中英文搜索、分类筛选、一键复制，含效果图预览。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--accent2:#1f6feb;
  --green:#3fb950;--purple:#bc8cff;--orange:#f0883e;--pink:#f778ba;
  --red:#ff7b72;--yellow:#d29922;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1e2e 100%);border-bottom:1px solid var(--border);padding:2rem 1.5rem 1.5rem;text-align:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
.header .subtitle{color:var(--text2);font-size:.9rem;margin-bottom:1rem}
.stats{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.4rem 1rem;font-size:.85rem;color:var(--text2)}
.stat strong{color:var(--accent);font-size:1.1rem;margin-right:.3rem}

/* Search */
.search-wrap{max-width:640px;margin:0 auto;position:relative}
.search-wrap input{width:100%;padding:.75rem 1rem .75rem 2.8rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text2)}
.search-wrap .icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text2);font-size:1.1rem;pointer-events:none}

/* Filters */
.filters{max-width:1200px;margin:1.2rem auto .5rem;padding:0 1rem;display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:.35rem .9rem;font-size:.82rem;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent2);border-color:var(--accent);color:#fff}
.filter-btn .count{background:var(--surface2);border-radius:10px;padding:0 .45rem;margin-left:.3rem;font-size:.75rem}
.filter-btn.active .count{background:rgba(255,255,255,.2)}

/* Grid */
.container{max-width:1200px;margin:0 auto;padding:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.no-results{text-align:center;padding:4rem 1rem;color:var(--text2);font-size:1.1rem}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;transition:all .25s;position:relative;display:flex;flex-direction:column}
.card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-2px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem;gap:.5rem}
.card-id{background:var(--surface2);color:var(--text2);font-size:.7rem;padding:.15rem .5rem;border-radius:6px;white-space:nowrap;flex-shrink:0}
.card-tag{display:inline-block;background:linear-gradient(135deg,var(--accent2),#7c3aed);color:#fff;font-size:.72rem;padding:.2rem .6rem;border-radius:6px;font-weight:500}
.card-title-cn{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:.3rem;line-height:1.4}
.card-title-en{font-size:.82rem;color:var(--text2);margin-bottom:.7rem;font-style:italic}

/* Card Image */
.card-image{width:100%;border-radius:8px;overflow:hidden;margin-bottom:.7rem;background:var(--bg);border:1px solid var(--border);cursor:pointer;position:relative}
.card-image img{width:100%;height:180px;object-fit:cover;display:block;transition:transform .3s}
.card-image:hover img{transform:scale(1.03)}
.card-image .img-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0);transition:background .3s;display:flex;align-items:center;justify-content:center}
.card-image:hover .img-overlay{background:rgba(0,0,0,.3)}
.card-image .zoom-icon{opacity:0;transition:opacity .3s;color:#fff;font-size:1.5rem;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.card-image:hover .zoom-icon{opacity:1}
.card-no-image{width:100%;height:80px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:8px;margin-bottom:.7rem;color:var(--text2);font-size:.78rem;border:1px dashed var(--border)}

.card-prompt{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.8rem;font-size:.78rem;color:var(--text);line-height:1.55;max-height:150px;overflow-y:auto;margin-bottom:.7rem;flex:1;word-break:break-word;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace}
.card-prompt::-webkit-scrollbar{width:4px}
.card-prompt::-webkit-scrollbar-track{background:transparent}
.card-prompt::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.card-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem}
.card-meta{font-size:.72rem;color:var(--text2);display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.card-meta .ref{color:var(--orange);font-weight:500}
.copy-btn{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:.4rem .9rem;font-size:.78rem;cursor:pointer;transition:all .2s;font-weight:500;display:flex;align-items:center;gap:.3rem;white-space:nowrap}
.copy-btn:hover{background:var(--accent);transform:scale(1.03)}
.copy-btn.copied{background:var(--green)}
.card-note{font-size:.72rem;color:var(--yellow);margin-top:.4rem;padding-top:.4rem;border-top:1px solid var(--border);line-height:1.4}

/* Lightbox */
.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:1000;display:none;align-items:center;justify-content:center;cursor:zoom-out;padding:2rem}
.lightbox.active{display:flex}
.lightbox img{max-width:90%;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.6);object-fit:contain}
.lightbox-close{position:fixed;top:1.5rem;right:1.5rem;color:#fff;font-size:2rem;cursor:pointer;z-index:1001;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1);transition:background .2s}
.lightbox-close:hover{background:rgba(255,255,255,.2)}

/* Footer */
.footer{text-align:center;padding:2rem 1rem;color:var(--text2);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}
.footer a{color:var(--accent)}

/* Responsive */
@media(max-width:768px){
  .header h1{font-size:1.4rem}
  .grid{grid-template-columns:1fr}
  .stats{gap:.8rem}
  .stat{padding:.3rem .7rem;font-size:.78rem}
  .header{padding:1.2rem 1rem 1rem}
  .card-image img{height:150px}
}
@media(max-width:400px){
  .card{padding:1rem}
  .card-prompt{font-size:.72rem;max-height:120px}
  .card-image img{height:120px}
}

/* Scroll to top */
.scroll-top{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;border-radius:50%;background:var(--accent2);color:#fff;border:none;cursor:pointer;font-size:1.2rem;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .2s;z-index:99}
.scroll-top:hover{background:var(--accent);transform:scale(1.1)}
.scroll-top.show{display:flex}

/* Toast */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:.6rem 1.5rem;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}

/* Loading */
.loading{text-align:center;padding:4rem;color:var(--text2)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="header">
  <h1>GPT Image 2 提示词大全</h1>
  <p class="subtitle">Awesome GPT Image 2 Prompt Collection — 支持中英文搜索 / 分类筛选 / 一键复制 / 效果图预览</p>
  <div class="stats" id="stats"></div>
  <div class="search-wrap">
    <span class="icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜索提示词... 支持中文/英文 (如: 海报、3D、poster、chibi)" autocomplete="off">
  </div>
</header>

<nav class="filters" id="filters"></nav>

<main class="container">
  <div class="loading" id="loading"><div class="spinner"></div><p>加载提示词数据...</p></div>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <p>没有找到匹配的提示词</p>
    <p style="font-size:.85rem;margin-top:.5rem">试试其他关键词或清除筛选条件</p>
  </div>
</main>

<!-- Lightbox for image zoom -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <img id="lightboxImg" src="" alt="效果图预览">
</div>

<button class="scroll-top" id="scrollTop" title="回到顶部">&#8593;</button>
<div class="toast" id="toast">已复制到剪贴板</div>

<footer class="footer">
  <p>数据来源：<a href="https://github.com/moosl/awsome-gpt-image-2-prompts" target="_blank">moosl/awsome-gpt-image-2-prompts</a> &amp; <a href="https://github.com/freestylefly/awesome-gpt-image-2" target="_blank">freestylefly/awesome-gpt-image-2</a> &amp; <a href="https://github.com/nexu-io/open-design" target="_blank">nexu-io/open-design</a></p>
  <p style="margin-top:.3rem">共收录 <strong id="totalCount">0</strong> 条提示词 · <strong id="imageCount">0</strong> 张效果图 · 持续更新中</p>
</footer>

<script>
// ===== CATEGORY CONFIG =====
const CAT_COLORS = {
  "3D/手办/潮玩":"#bc8cff",
  "动漫/插画":"#f778ba",
  "3D渲染/材质":"#58a6ff",
  "产品展示图":"#3fb950",
  "风景/场景":"#79c0ff",
  "海报设计":"#ff7b72",
  "文字渲染":"#d29922",
  "人像/角色":"#f0883e",
  "广告设计":"#da3633",
  "AI卡牌":"#a371f7",
  "食物摄影":"#56d364",
  "创意转换":"#db61a2",
  "Logo设计":"#58a6ff",
  "UI与界面":"#58a6ff",
  "信息图设计":"#d29922",
  "摄影":"#3fb950",
  "插画/艺术":"#f778ba",
  "古风/历史":"#bc8cff",
  "场景/叙事":"#79c0ff",
  "建筑/空间":"#56d364",
  "文档设计":"#a371f7",
  "其他":"#8b949e",
  "图像模板 - 头像肖像":"#f0883e",
  "图像模板 - 社交媒体海报":"#ff7b72",
  "图像模板 - 游戏截图/UI":"#58a6ff",
  "图像模板 - 信息图表":"#d29922",
  "图像模板 - 插画地图":"#f778ba",
  "图像模板 - 产品海报":"#3fb950",
  "图像模板 - 动漫插画":"#a371f7",
  "视频模板 - 电影叙事":"#79c0ff",
  "视频模板 - 动画":"#56d364",
  "视频模板 - 短视频/影像":"#db61a2",
  "视频模板 - 广告/品牌":"#da3633",
  "视频模板 - 武侠/历史":"#bc8cff",
  "视频模板 - 舞蹈/动作":"#f778ba",
  "视频模板 - 特效/奇幻":"#ff7b72",
  "视频模板 - 游戏/科幻":"#58a6ff",
  "视频模板 - 动漫改编":"#d29922",
  "视频模板 - 社交/舞蹈":"#3fb950"
};

// ===== STATE =====
let PROMPTS = [];
let activeCategory = null;
let searchQuery = "";

// ===== LOAD DATA =====
async function loadData() {
  try {
    const resp = await fetch('prompts.json');
    PROMPTS = await resp.json();
    document.getElementById("loading").style.display = "none";
    init();
  } catch(e) {
    document.getElementById("loading").innerHTML = '<p style="color:var(--red)">加载数据失败，请刷新重试</p>';
    console.error(e);
  }
}

// ===== INIT =====
function init() {
  document.getElementById("totalCount").textContent = PROMPTS.length;
  document.getElementById("imageCount").textContent = PROMPTS.filter(p => p.image).length;
  renderStats();
  renderFilters();
  renderCards();
  bindEvents();
}

function renderStats() {
  const cats = {};
  PROMPTS.forEach(p => { cats[p.category_cn] = (cats[p.category_cn]||0)+1; });
  const imgCount = PROMPTS.filter(p => p.image).length;
  const el = document.getElementById("stats");
  el.innerHTML = `<div class="stat"><strong>${PROMPTS.length}</strong>条提示词</div>`
    + `<div class="stat"><strong>${Object.keys(cats).length}</strong>个分类</div>`
    + `<div class="stat"><strong>${imgCount}</strong>张效果图</div>`
    + `<div class="stat"><strong>${PROMPTS.filter(p=>p.needs_ref).length}</strong>条需要参考图</div>`;
}

function renderFilters() {
  const cats = {};
  PROMPTS.forEach(p => { cats[p.category_cn] = (cats[p.category_cn]||0)+1; });
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const el = document.getElementById("filters");
  let html = `<button class="filter-btn active" data-cat="">全部<span class="count">${PROMPTS.length}</span></button>`;
  sorted.forEach(([cat,count]) => {
    html += `<button class="filter-btn" data-cat="${cat}">${cat}<span class="count">${count}</span></button>`;
  });
  el.innerHTML = html;
}

function renderCards() {
  const filtered = PROMPTS.filter(p => {
    if (activeCategory && p.category_cn !== activeCategory) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const searchable = (p.title_cn + " " + p.title_en + " " + p.prompt + " " + p.category_cn + " " + p.author + " " + (p.note||"")).toLowerCase();
      return searchable.includes(q);
    }
    return true;
  });

  const grid = document.getElementById("grid");
  const noResults = document.getElementById("noResults");

  if (filtered.length === 0) {
    grid.innerHTML = "";
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";

  grid.innerHTML = filtered.map(p => {
    const color = CAT_COLORS[p.category_cn] || "#58a6ff";
    const promptEscaped = escapeHtml(p.prompt);
    const noteHtml = p.note ? `<div class="card-note">${escapeHtml(p.note)}</div>` : "";
    const refBadge = p.needs_ref ? `<span class="ref">需上传参考图</span>` : "";
    
    // Image section
    let imageHtml = "";
    if (p.image) {
      imageHtml = `<div class="card-image" data-img="${p.image}">
        <img src="${p.image}" alt="${escapeHtml(p.title_en)}" loading="lazy" onerror="this.parentElement.outerHTML='<div class=\\'card-no-image\\'>图片加载失败</div>'">
        <div class="img-overlay"><span class="zoom-icon">&#128269;</span></div>
      </div>`;
    } else {
      imageHtml = `<div class="card-no-image">暂无效果图</div>`;
    }

    return `
    <article class="card" data-id="${p.id}">
      <div class="card-header">
        <span class="card-tag" style="background:linear-gradient(135deg,${color},${color}88)">${p.category_cn}</span>
        <span class="card-id">#${p.id}</span>
      </div>
      <div class="card-title-cn">${escapeHtml(p.title_en)}</div>
      <div class="card-title-en">${p.category_cn}</div>
      ${imageHtml}
      <div class="card-prompt">${promptEscaped}</div>
      <div class="card-footer">
        <div class="card-meta">
          <span>${p.author || p.source}</span>
          ${refBadge}
        </div>
        <button class="copy-btn" data-prompt="${btoa(unescape(encodeURIComponent(p.prompt)))}">
          <span>&#128203;</span> 复制
        </button>
      </div>
      ${noteHtml}
    </article>`;
  }).join("");
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/\n/g,"<br>");
}

function bindEvents() {
  // Search
  const searchInput = document.getElementById("searchInput");
  let debounceTimer;
  searchInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      searchQuery = searchInput.value.trim();
      renderCards();
    }, 200);
  });

  // Filters
  document.getElementById("filters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.cat || null;
    renderCards();
  });

  // Copy
  document.getElementById("grid").addEventListener("click", e => {
    const btn = e.target.closest(".copy-btn");
    if (btn) {
      const text = decodeURIComponent(escape(atob(btn.dataset.prompt)));
      navigator.clipboard.writeText(text).then(() => {
        btn.innerHTML = "<span>&#10003;</span> 已复制";
        btn.classList.add("copied");
        showToast();
        setTimeout(() => {
          btn.innerHTML = "<span>&#128203;</span> 复制";
          btn.classList.remove("copied");
        }, 2000);
      }).catch(() => {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        btn.innerHTML = "<span>&#10003;</span> 已复制";
        btn.classList.add("copied");
        showToast();
        setTimeout(() => {
          btn.innerHTML = "<span>&#128203;</span> 复制";
          btn.classList.remove("copied");
        }, 2000);
      });
      return;
    }

    // Image click -> lightbox
    const imgWrap = e.target.closest(".card-image");
    if (imgWrap) {
      const imgSrc = imgWrap.dataset.img;
      if (imgSrc) {
        openLightbox(imgSrc);
      }
    }
  });

  // Lightbox
  const lightbox = document.getElementById("lightbox");
  const lightboxClose = document.getElementById("lightboxClose");
  
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox || e.target === lightboxClose) {
      closeLightbox();
    }
  });
  
  lightboxClose.addEventListener("click", closeLightbox);
  
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
  });

  // Scroll to top
  const scrollBtn = document.getElementById("scrollTop");
  window.addEventListener("scroll", () => {
    scrollBtn.classList.toggle("show", window.scrollY > 400);
  });
  scrollBtn.addEventListener("click", () => {
    window.scrollTo({top:0,behavior:"smooth"});
  });
}

function openLightbox(src) {
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  lightboxImg.src = src;
  lightbox.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  const lightbox = document.getElementById("lightbox");
  lightbox.classList.remove("active");
  document.body.style.overflow = "";
}

function showToast() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1500);
}

document.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
